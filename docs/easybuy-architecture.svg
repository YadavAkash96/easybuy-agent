<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="720" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">EasyBuy, Agentic Shopping Assistant, System Architecture</text>

  <!-- ── USER INPUT ── -->
  <rect x="330" y="60" width="240" height="52" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b82f6">User</text>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#94a3b8">"I need a skiing kit under 400 EUR"</text>

  <!-- arrow down -->
  <line x1="450" y1="112" x2="450" y2="138" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── FRONTEND ── -->
  <rect x="180" y="138" width="540" height="64" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6366f1">Frontend, Next.js 15 / React 19 / TypeScript / Tailwind CSS v4</text>
  <text x="285" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">Step 1: Chat</text>
  <text x="371" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">Step 2: Breakdown</text>
  <text x="457" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">Step 3: Search</text>
  <text x="543" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">Step 4: Cart</text>
  <text x="629" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">Step 5: Checkout</text>

  <!-- arrow down -->
  <line x1="450" y1="202" x2="450" y2="228" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="220" font-size="10" fill="#64748b">REST / JSON</text>

  <!-- ── FASTAPI BACKEND ── -->
  <rect x="130" y="228" width="640" height="52" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b5cf6">FastAPI Backend (:8000)</text>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#94a3b8">/intent-chat  /breakdown  /search  /cart  /checkout  /invoice/email</text>

  <!-- arrow down to agents -->
  <line x1="450" y1="280" x2="450" y2="306" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── AGENT PIPELINE LABEL ── -->
  <text x="450" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">Multi-Agent Pipeline</text>

  <!-- Agent boxes row -->
  <!-- Intent Agent -->
  <rect x="30" y="334" width="148" height="76" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="104" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Intent Agent</text>
  <text x="104" y="370" text-anchor="middle" font-size="9.5" fill="#93c5fd">Gemini 2.0 Pro</text>
  <text x="104" y="385" text-anchor="middle" font-size="9" fill="#64748b">Gathers requirements</text>
  <text x="104" y="398" text-anchor="middle" font-size="9" fill="#64748b">Extracts budget + constraints</text>

  <!-- Breakdown Agent -->
  <rect x="198" y="334" width="148" height="76" rx="8" fill="#1a1a3e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="272" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#6366f1">Breakdown Agent</text>
  <text x="272" y="370" text-anchor="middle" font-size="9.5" fill="#a5b4fc">Gemini 2.0 Pro</text>
  <text x="272" y="385" text-anchor="middle" font-size="9" fill="#64748b">Expands kits into items</text>
  <text x="272" y="398" text-anchor="middle" font-size="9" fill="#64748b">Allocates per-item budget</text>

  <!-- Search Agent -->
  <rect x="366" y="334" width="148" height="76" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">Search Agent</text>
  <text x="440" y="370" text-anchor="middle" font-size="9.5" fill="#86efac">SerpAPI</text>
  <text x="440" y="385" text-anchor="middle" font-size="9" fill="#64748b">Multi-platform search</text>
  <text x="440" y="398" text-anchor="middle" font-size="9" fill="#64748b">Budget-filtered queries</text>

  <!-- Ranking Agent -->
  <rect x="534" y="334" width="148" height="76" rx="8" fill="#1c1a10" stroke="#eab308" stroke-width="1.5"/>
  <text x="608" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#eab308">Ranking Agent</text>
  <text x="608" y="370" text-anchor="middle" font-size="9.5" fill="#fde047">Gemini 2.0 Pro</text>
  <text x="608" y="385" text-anchor="middle" font-size="9" fill="#64748b">Scores: price, reviews</text>
  <text x="608" y="398" text-anchor="middle" font-size="9" fill="#64748b">delivery speed filters</text>

  <!-- Cart + Invoice Agent -->
  <rect x="702" y="334" width="148" height="76" rx="8" fill="#1f0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="776" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#ef4444">Cart + Invoice Agent</text>
  <text x="776" y="370" text-anchor="middle" font-size="9.5" fill="#fca5a5">Resend API</text>
  <text x="776" y="385" text-anchor="middle" font-size="9" fill="#64748b">Multi-retailer cart</text>
  <text x="776" y="398" text-anchor="middle" font-size="9" fill="#64748b">PDF invoice via email</text>

  <!-- Connector arrows between agents -->
  <line x1="178" y1="372" x2="198" y2="372" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="346" y1="372" x2="366" y2="372" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="514" y1="372" x2="534" y2="372" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="682" y1="372" x2="702" y2="372" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── EXTERNAL SERVICES ── -->
  <text x="450" y="444" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">External Services</text>

  <!-- Gemini -->
  <rect x="100" y="456" width="180" height="56" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b82f6">Google Gemini</text>
  <text x="190" y="496" text-anchor="middle" font-size="10" fill="#94a3b8">2.0 Pro Preview</text>
  <text x="190" y="508" text-anchor="middle" font-size="9" fill="#64748b">Intent, breakdown, ranking</text>

  <!-- SerpAPI -->
  <rect x="360" y="456" width="180" height="56" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">SerpAPI</text>
  <text x="450" y="496" text-anchor="middle" font-size="10" fill="#94a3b8">Google Shopping</text>
  <text x="450" y="508" text-anchor="middle" font-size="9" fill="#64748b">Multi-retailer product data</text>

  <!-- Resend -->
  <rect x="620" y="456" width="180" height="56" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="710" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef4444">Resend</text>
  <text x="710" y="496" text-anchor="middle" font-size="10" fill="#94a3b8">Email API</text>
  <text x="710" y="508" text-anchor="middle" font-size="9" fill="#64748b">PDF invoice delivery</text>

  <!-- ── INFRA ── -->
  <rect x="200" y="548" width="500" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="570" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">Infrastructure</text>
  <text x="450" y="589" text-anchor="middle" font-size="10" fill="#64748b">Docker + docker-compose  |  Makefile  |  Dev cache mode (zero API cost)  |  Prod live mode</text>

  <!-- ── FEATURES STRIP ── -->
  <rect x="50" y="628" width="800" height="68" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="648" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">Key Capabilities</text>
  <text x="160" y="666" text-anchor="middle" font-size="10" fill="#64748b">Kit auto-expansion</text>
  <text x="300" y="666" text-anchor="middle" font-size="10" fill="#64748b">Budget allocation</text>
  <text x="450" y="666" text-anchor="middle" font-size="10" fill="#64748b">Multi-platform deals</text>
  <text x="600" y="666" text-anchor="middle" font-size="10" fill="#64748b">Smart ranking filters</text>
  <text x="750" y="666" text-anchor="middle" font-size="10" fill="#64748b">End-to-end checkout</text>
  <text x="160" y="683" text-anchor="middle" font-size="9" fill="#475569">"skiing kit" to full cart</text>
  <text x="300" y="683" text-anchor="middle" font-size="9" fill="#475569">total or per-item</text>
  <text x="450" y="683" text-anchor="middle" font-size="9" fill="#475569">not just Amazon or eBay</text>
  <text x="600" y="683" text-anchor="middle" font-size="9" fill="#475569">reviews, speed, price</text>
  <text x="750" y="683" text-anchor="middle" font-size="9" fill="#475569">PDF invoice to inbox</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

</svg>
